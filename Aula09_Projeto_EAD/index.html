<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Peso Ideal</title>
    <link rel="icon" href="/Aula09_Projeto_EAD/assets/icons/AELP.png" type="image/png">
    <link rel="stylesheet" href="/Aula09_Projeto_EAD/styles/style.css">
    <script src="/Aula09_Projeto_EAD/scripts/script.js" defer></script> // defer: continua baixando JS sem parar de
    carregar o HTML
</head>

<body>
    <img src="/Aula09_Projeto_EAD/assets/images/peso_ideal.png" alt="Balança de peso">
    <h1>Programa Cálculo do Peso Ideal</h1>
    <form action="">
        <p>Nome:
            <input type="text" id="inNome" required>
        </p>
        <p>Sexo:
            <input type="radio" name="sexo" id="inMasculino" required> Masculino
            <input type="radio" name="sexo" id="inFeminino" required> Feminino
        </p>
        <p>Altura (m):
            <input type="number" min="0" step="0.01" id="inAltura" required>
        </p>
        <input type="submit" value="Calcular Peso Ideal">
        <input type="reset" value="Limpar Campos">
    </form>
    <h3></h3>
</body>

</html>
