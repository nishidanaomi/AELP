<!-- Elaborar um programa que leia dois números. Calcule e informe a soma desses números. -->

<meta charset="UTF-8">
<script>
    const num1 = Number(prompt("Digite o 1º número:"));
    const num2 = Number(prompt("Digite o 2º número:"));
    const soma = num1+num2;
    alert("A soma dos dois números é igual a: " + soma);
</script>
