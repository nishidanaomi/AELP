<!-- Elaborar um programa com as seguintes definições:
• Receba o preço de custo de um produto e mostre o valor de venda;
• Sabe-se que o preço de custo receberá um acréscimo de acordo com um
percentual de lucro informado pelo vendedor;
• O valor de venda de um produto é igual ao preço de custo somado ao percentual
de lucro que o vendedor deseja sobre este produto. -->

<meta charset="UTF-8">
<script>
    alert(`Bem-vindos a Calculadora de Preços!
Aperte o OK para continuar.`);
    const custo = prompt(`Primeiro coloque o preço de custo do produto: R$`);
    if (custo === null || custo.trim() === "") {
        alert(`Ops! Algo saiu errado. Por favor aperte o F5 e comece novamente.`);
    } else {
        const precoCusto = Number(custo.replace(',', '.'));
        if (isNaN(precoCusto)) {
            alert(`Erro: O custo deve ser um número.
Aperte o F5 e comece novamente.`);
        } else {
            const lucro = prompt(`Agora digite o valor da porcentagem que quer acrescentar em seu produto:`);
            if (lucro === null || lucro.trim() === "") {
                alert(`Ops! Algo saiu errado. O lucro deve ser um número.
Aperte o F5 para começar novamente.`);
            } else {
                const percentualLucro = Number(lucro.replace(',', '.'));
                if (isNaN(percentualLucro)) {
                                   alert(`Ops! Algo saiu errado. Digite um número válido.
Aperte o F5 e comece novamente.`);
                } else {
                    const precoVenda = precoCusto * (1 + percentualLucro / 100);
                    alert(`O preço final de venda do produto é: R$ ${precoVenda.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}.`);
                }
            }
        }
    }
</script>
